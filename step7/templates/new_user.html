<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>ユーザー登録</title>
  </head>
  <body>
    <h1>ユーザー登録フォーム</h1>
    <form action="/users" method="POST">
      <label for="name">名前:</label>
      <input type="text" id="name" name="name" required />
      <button type="submit">登録</button>
    </form>
    <p><a href="/users/list">ユーザー一覧を見る</a></p>
  </body>
</html>
